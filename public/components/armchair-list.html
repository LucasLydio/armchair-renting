<div>
  <div class="flex-column" style="justify-content: space-between; margin-bottom: 10px">
    <div>
      <div class="muted" style="font-size: 12px">Listagem</div>
      <p class="text-white">Poltronas cadastradas</p>
    </div>
    <div class="actions">
      <button class="btn btn-dark" id="btn-open-form-list" type="button">
        <i class="bi bi-plus-circle"></i> Cadastrar Poltrona
      </button>
    </div>
  </div>
  <form id="search-form-list" class="toolbar">
    <input class="input" id="search-name-list" placeholder="Buscar por nome..." />
    <button class="btn btn-dark" type="submit">
      <i class="bi bi-search"></i>
    </button>
    <button class="btn btn-dark" id="btn-clear-list" type="button">
      <i class="bi bi-x"></i>
    </button>
  </form>

  <div id="armchairs-list" class="list-group"></div>

  <div
    id="pagination-list"
    class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2"
  >
    <div id="pagination-info-list" class="text-secondary small">—</div>

    <div class="d-flex align-items-center gap-2">
      <label class="text-secondary small mb-0" for="page-size-list">Por página</label>
      <select
        id="page-size-list"
        class="form-select form-select-sm bg-dark text-white border-secondary"
        style="width: auto"
      >
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15">15</option>
      </select>

      <div class="btn-group" role="group" aria-label="Paginação">
        <button class="btn btn-outline-light btn-sm" id="page-prev-list" type="button">Anterior</button>
        <button class="btn btn-outline-light btn-sm" id="page-next-list" type="button">Próxima</button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="armchairDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white border border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title">Detalhes da poltrona</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body" id="armchair-details-body"></div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Fechar</button>
          <button type="button" class="btn btn-success" id="details-edit">
            <i class="bi bi-pencil-square"></i> Editar
          </button>
          <button type="button" class="btn btn-danger" id="details-delete">
            <i class="bi bi-trash3"></i> Excluir
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
