<div class="modal-backdrop " id="confirm-backdrop" data-open="false" role="dialog" aria-modal="true">

    <div class="modal__body">Tem certeza que deseja excluir este registro?</div>
    <div class="actions" style="justify-content: flex-end">

    </div>
  </div>
</div>
