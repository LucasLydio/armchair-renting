<div class="card login">
  <div class="login__brand">
    <img src="assets/images/logo.svg" alt="Logo" />
    <div>
      <h1>Login</h1>
      <p>Acesso simples para controlar entrada.</p>
    </div>
  </div>

  <form id="login-form">
    <div class="field">
      <label for="username">Usuário</label>
      <input class="input" id="username" name="username" autocomplete="username" placeholder="adm1" required />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input
        class="input"
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        placeholder="adm1"
        required
      />
    </div>

    <button class="btn btn--primary" type="submit">Entrar</button>
    <p class="muted" style="margin-top: 12px">Usuário fixo: <b>adm1</b> • Senha fixa: <b>adm1</b></p>
  </form>
</div>
