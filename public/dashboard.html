<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel • Armchair Renting</title>
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@350;600&family=Staatliches&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <header id="header-root" data-component="header"></header>
    <div id="alert-root"></div>

    <main class="main-dashboard">
      <div class="actions flex flex-column gap-2">
        <div class="mb-3">
          <section class="card is-hidden" id="form-root" data-component="armchair-form"></section>
        </div>
        <div>
          <section class="card" id="table-root" data-component="armchair-table"></section>
        </div>
        <div>
          <section class="card" id="list-root" data-component="armchair-list"></section>
        </div>
      </div>
    </main>

    <div id="modal-root" data-component="confirm-modal"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/dashboard.js"></script>
  </body>
</html>
